<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ranod Graduation Book</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #F6EFE5;
  color: #3A1F14;
}

section {
  padding: 70px 8%;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
}

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  gap: 50px;
  background: linear-gradient(135deg, #F6EFE5, #E8D4BE);
}

.hero-text { flex: 1; }

.hero-text .small {
  letter-spacing: 4px;
  font-size: 13px;
  text-transform: uppercase;
  color: #8B5E3C;
}

.hero-text h1 {
  font-size: 58px;
  margin: 15px 0;
}

.hero-text p {
  font-size: 16px;
  line-height: 1.7;
  max-width: 450px;
}

/* IMAGE FIX */
.hero-img {
  flex: 1;
  display: flex;
  justify-content: center;
}

.hero-img img {
  width: 100%;
  max-width: 400px;
  height: auto;
  border-radius: 26px;
  box-shadow: 0 25px 60px rgba(58, 31, 20, 0.25);
}

/* BUTTON */
.main-btn {
  margin-top: 25px;
  padding: 14px 26px;
  border-radius: 50px;
  background: #3A1F14;
  color: #FFF8EF;
  border: none;
  cursor: pointer;
}

.floating-message-btn {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 50;
  padding: 12px 20px;
  border-radius: 50px;
  background: #006E79;
  color: white;
  border: none;
}

/* TEXT */
.section-title {
  font-size: 38px;
}

.section-subtitle {
  max-width: 600px;
  line-height: 1.7;
}

/* POLAROID */
.polaroid-wrapper {
  position: relative;
  width: 100%;
  max-width: 300px;
  height: 240px;
  margin: 30px auto;
}

.polaroid {
  position: absolute;
  background: white;
  padding: 10px;
  border-radius: 10px;
  width: 160px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.polaroid img {
  width: 100%;
  border-radius: 6px;
}

.p1 {
  top: 0;
  left: 0;
  transform: rotate(-5deg);
}

.p2 {
  bottom: 0;
  right: 0;
  transform: rotate(5deg);
}

/* MOBILE */
@media (max-width: 700px) {

  .hero {
    flex-direction: column;
    text-align: center;
  }

  .hero-text h1 {
    font-size: 40px;
  }

  .hero-img img {
    max-width: 85%;
  }

  .polaroid-wrapper {
    display: flex;
    flex-direction: column;
    height: auto;
    gap: 15px;
  }

  .polaroid {
    position: static;
    width: 85%;
    transform: none;
  }
}
</style>
</head>

<body>

<button class="floating-message-btn">Write a Message ✨</button>

<section class="hero">
  <div class="hero-text">
    <div class="small">Class of 2026</div>
    <h1>Ranod’s Graduation Book</h1>
    <p>
      A digital memory book filled with dreams, dedication, beautiful memories.
    </p>
    <button class="main-btn">Write a Graduation Message 🤍</button>
  </div>

  <div class="hero-img">
    <img src="graduation.jpg">
  </div>
</section>

<section>
  <h2 class="section-title">About Me</h2>
  <p class="section-subtitle">
    I’m Ranod, an Information Systems graduate with a passion for design.
  </p>

  <!-- الصور -->
  <div class="polaroid-wrapper">
    <div class="polaroid p1">
      <img src="me1.jpeg">
    </div>

    <div class="polaroid p2">
      <img src="me2.jpeg">
    </div>
  </div>
</section>

<section>
  <h2 class="section-title">Thank You</h2>
  <p class="section-subtitle">
    This is just the beginning 🤍
  </p>
</section>

</body>
</html>
